services:
  app:
    build: .
    container_name: sokora
    restart: always
    volumes:
      - ./data.db:/app/data.db
      - ./.env:/app/.env
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: sokora
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: sokora-db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sokora -d sokora-db"]
      interval: 5s
      timeout: 5s
      retries: 5
